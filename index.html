<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>背书管理系统 · iPad手势版</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ===== 原有样式保留，仅针对iPad比例微调容器和间距 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "微软雅黑", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e6efff 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1280px;      /* iPad横屏舒适宽度，保留边距 */
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            padding: 32px 36px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #718096;
            font-size: 15px;
        }
        
        .reminder {
            background: #fef3c7;
            color: #92400e;
            padding: 12px 20px;
            border-radius: 14px;
            margin: 12px 0;
            font-weight: 500;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
            animation: pulse 1.2s infinite;
        }
        
        /* 同步面板 - 始终显示 */
        .sync-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 24px 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.2s ease;
        }
        
        .class-section {
            margin-bottom: 30px;
        }
        
        .class-tabs {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .class-tab {
            padding: 14px 28px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            color: #4a5568;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .class-tab.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-color: #4f46e5;
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.25);
            transform: translateY(-2px);
        }
        
        .add-class-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: 0.2s;
        }
        
        .control-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 32px;
            display: none;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        
        .no-class-tip {
            text-align: center;
            color: #718096;
            padding: 60px 0;
            font-size: 18px;
        }
        
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .input-group label {
            font-size: 14px;
            color: #4a5568;
            font-weight: 600;
        }
        
        input, select, button {
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }
        
        input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            transform: translateY(-1px);
        }
        
        .file-upload-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            cursor: pointer;
            height: 58px;
        }
        
        .file-upload-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
            z-index: 10;
        }
        
        .file-upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        button {
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-info { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-secondary { background: linear-gradient(135deg, #94a3b8, #64748b); color: white; }
        .btn-purple { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .btn-sync { background: linear-gradient(135deg, #ec4899, #db2777); color: white; }
        
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            flex: 1;
            min-width: 130px;
            background: white;
            padding: 18px 12px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        
        .stat-card h4 { font-size: 14px; color: #718096; margin-bottom: 10px; }
        .stat-card .num { font-size: 28px; font-weight: 700; color: #2d3748; }
        
        /* 三栏布局，iPad上更宽松 */
        .status-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 28px;
            display: none;
        }
        
        .status-now {
            display: block;
            margin-bottom: 28px;
            display: none;
        }
        
        .status-card, .now-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(226, 232, 240, 0.6);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .status-card h3, .now-card h3 {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            flex-shrink: 0;
        }
        
        .student-list {
            flex: 1;
            overflow-y: auto;
            max-height: 460px;
            padding-right: 6px;
        }
        
        .now-list {
            max-height: 180px;
            overflow-y: auto;
        }
        
        /* 卡片手势滑动专用样式，保留原有样式并增加触摸滑动区域 */
        .student-item, .now-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            background: #f8fafc;
            margin-bottom: 12px;
            border-radius: 20px;
            transition: all 0.2s ease;
            border: 1px solid rgba(226, 232, 240, 0.5);
            cursor: grab;
            user-select: none;
            touch-action: pan-y pinch-zoom;  /* 保留垂直滚动，水平滑动由js接管 */
            position: relative;
        }
        
        .now-item {
            background: #fef3c7;
            border: 1px solid #f59e0b;
        }
        
        .student-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        .student-name {
            font-weight: 700;
            color: #2d3748;
            font-size: 17px;
        }
        
        .student-num {
            font-size: 13px;
            color: #718096;
        }
        
        .student-remark {
            font-size: 12px;
            color: #4f46e5;
            background: #e0e7ff;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            max-width: 130px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .student-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .student-actions button {
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 30px;
        }
        
        .search-box {
            margin-bottom: 18px;
            flex-shrink: 0;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            background: white;
        }
        
        .record-section {
            background: #f8fafc;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            display: none;
        }
        
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        
        .record-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .record-tab {
            padding: 8px 20px;
            background: #e2e8f0;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .record-tab.active {
            background: #4f46e5;
            color: white;
        }
        
        .record-content {
            max-height: 380px;
            overflow-y: auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
        }
        
        .random-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 24px;
            margin: 24px 0 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        
        .random-left, .random-right {
            background: white;
            border-radius: 20px;
            padding: 18px;
        }
        
        .random-student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: #f9f9fc;
            border-radius: 18px;
            margin-bottom: 10px;
        }
        
        .random-add-btn {
            padding: 6px 18px;
            background: #10b981;
            color: white;
            border-radius: 30px;
            font-size: 13px;
        }
        
        .random-drawn-list {
            max-height: 180px;
            overflow-y: auto;
            background: #f1f5f9;
            border-radius: 18px;
            padding: 12px;
            margin: 12px 0;
        }
        
        .random-drawn-tag {
            background: #4f46e5;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            display: inline-block;
            margin: 4px;
        }
        
        .end-task-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 28px;
        }
        
        .sync-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .sync-input-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .sync-input-group input {
            flex: 2;
            min-width: 240px;
        }
        
        .sync-tip {
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 14px;
        }
        
        @media (max-width: 900px) {
            .container { padding: 24px 20px; }
            .status-section { grid-template-columns: 1fr; gap: 20px; }
            .random-panel > div { grid-template-columns: 1fr; gap: 20px; }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* 手势滑动提示轻点缀 */
        .student-item {
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📖 背书管理系统 · iPad手势版</h1>
        <p id="headerDesc">滑动卡片快速流转 | 向右排队 | 上划背书 | 左滑返回</p>
    </div>
    <div id="reminderBox" style="text-align: center; margin-bottom: 20px;"></div>
    
    <!-- 同步面板 -->
    <div class="sync-panel" id="syncPanel">
        <div class="sync-header">
            <h3>🔄 跨设备同步</h3>
            <div class="sync-buttons">
                <button class="btn-purple" id="generateSyncKeyBtn">🔑 生成密钥</button>
                <button class="btn-sync" id="showSyncInputBtn">📱 同步数据</button>
            </div>
        </div>
        <div id="syncInputArea" style="display: none;">
            <div class="sync-input-group">
                <input type="text" id="syncKeyInput" placeholder="粘贴同步密钥...">
                <button class="btn-success" id="importSyncKeyBtn">导入</button>
                <button class="btn-secondary" id="cancelSyncBtn">取消</button>
            </div>
            <div id="syncConfirmArea" style="display: none; margin-top: 12px;">
                <div class="sync-tip" id="syncPreviewInfo"></div>
                <div style="display: flex; gap: 12px; margin-top: 12px;">
                    <button class="btn-primary" id="confirmOverwriteSync">覆盖</button>
                    <button class="btn-info" id="confirmMergeSync">合并</button>
                    <button class="btn-secondary" id="cancelConfirmSync">取消</button>
                </div>
            </div>
        </div>
    </div>

    <div class="class-section">
        <div class="class-tabs" id="classTabs">
            <button class="add-class-btn" id="addClassBtn">+ 新增班级</button>
        </div>
    </div>
    <div class="no-class-tip" id="noClassTip">暂无班级，请点击上方「新增班级」按钮创建第一个班级</div>
    <div class="control-panel" id="controlPanel">
        <div class="input-grid">
            <div class="input-group"><label>学生姓名</label><input type="text" id="studentName" placeholder="请输入学生姓名"></div>
            <div class="input-group"><label>自定义学号（可选）</label><input type="number" id="customNum" placeholder="留空自动编号"></div>
            <div class="input-group"><label>Excel导入</label><div class="file-upload-wrapper"><input type="file" id="excelFile" accept=".xlsx,.xls" class="file-upload-input"><button type="button" class="file-upload-btn">📤 选择文件</button><div class="file-name" id="fileName">未选择文件</div></div></div>
        </div>
        <div class="btn-group">
            <button class="btn-primary" id="addStudentBtn">手动添加</button>
            <button class="btn-success" id="importExcelBtn">导入Excel</button>
            <button class="btn-info" id="exportExcelBtn">导出数据</button>
            <button class="btn-warning" id="resetBtn">重置班级</button>
            <button class="btn-danger" id="clearAllBtn">清空所有</button>
        </div>
        <div class="stats-bar"><div class="stat-card"><h4>总人数</h4><div class="num" id="totalNum">0</div></div><div class="stat-card"><h4>未背书</h4><div class="num" id="noReciteNum">0</div></div><div class="stat-card"><h4>排队中</h4><div class="num" id="queueNum">0</div></div><div class="stat-card"><h4>正在背书</h4><div class="num" id="recitingNum">0</div></div><div class="stat-card"><h4>已完成</h4><div class="num" id="doneNum">0</div></div></div>
    </div>
    
    <!-- 随机抽取面板 -->
    <div class="random-panel" id="randomPanel" style="display: none;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="random-left"><h4>📋 未背书学生 <span id="randomLeftCount"></span></h4><div id="randomLeftList" style="max-height: 320px; overflow-y: auto;"></div></div>
            <div class="random-right"><div class="random-right-top" style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;"><h4>🎲 抽取设置</h4><input type="number" id="randomCountInput" min="1" value="1" style="width: 80px;"><button class="btn-purple" id="doRandomBtn">抽取</button><button class="btn-success" id="replaceByRandomBtn">✅ 替换未背书</button></div><div><strong>已抽取</strong> <span id="drawnCount">0</span></div><div class="random-drawn-list" id="randomDrawnList"></div><button class="btn-danger" id="clearDrawnBtn">清空抽取</button></div>
        </div>
    </div>
    
    <div class="status-now" id="statusNow"><div class="now-card"><h3>正在背书 <span id="recitingCount">0人</span></h3><div class="now-list" id="recitingList"></div></div></div>
    <div class="status-section" id="statusSection">
        <div class="status-card"><h3>未背书 <span id="noReciteCount">0人</span></h3><div class="search-box"><input type="text" id="searchNoRecite" placeholder="搜索姓名/学号"></div><div class="student-list" id="noReciteList"></div></div>
        <div class="status-card"><h3>排队中 <span id="queueCount">0人</span></h3><div class="search-box"><input type="text" id="searchQueue" placeholder="搜索姓名/学号"></div><div class="student-list" id="queueList"></div></div>
        <div class="status-card"><h3>已完成 <span id="doneCount">0人</span></h3><div class="search-box"><input type="text" id="searchDone" placeholder="搜索姓名/学号"></div><div class="student-list" id="doneList"></div></div>
    </div>
    <div class="record-section" id="recordSection"><div class="record-header"><h3>📜 背书记录</h3><button class="btn-danger" id="clearRecordsBtn">清空所有记录</button></div><div class="record-tabs" id="recordTabs"></div><div class="record-content" id="recordContent"></div></div>
    <button class="end-task-btn" id="endTaskBtn" style="display: none;">🚩 结束当日背书任务</button>
</div>

<script>
    (function(){
        let classData = JSON.parse(localStorage.getItem('背书系统数据')) || {};
        let recordData = JSON.parse(localStorage.getItem('背书记录数据')) || {};
        let currentClass = "";
        let currentRecordId = "";
        let pendingSyncData = null;
        let drawnStudents = [];
        
        // DOM 元素绑定
        const classTabs = document.getElementById("classTabs");
        const addClassBtn = document.getElementById("addClassBtn");
        const studentName = document.getElementById("studentName");
        const customNum = document.getElementById("customNum");
        const addStudentBtn = document.getElementById("addStudentBtn");
        const excelFile = document.getElementById("excelFile");
        const fileName = document.getElementById("fileName");
        const importExcelBtn = document.getElementById("importExcelBtn");
        const exportExcelBtn = document.getElementById("exportExcelBtn");
        const resetBtn = document.getElementById("resetBtn");
        const clearAllBtn = document.getElementById("clearAllBtn");
        const noClassTip = document.getElementById("noClassTip");
        const controlPanel = document.getElementById("controlPanel");
        const statusNow = document.getElementById("statusNow");
        const statusSection = document.getElementById("statusSection");
        const reminderBox = document.getElementById("reminderBox");
        const recordSection = document.getElementById("recordSection");
        const recordTabs = document.getElementById("recordTabs");
        const recordContent = document.getElementById("recordContent");
        const clearRecordsBtn = document.getElementById("clearRecordsBtn");
        const endTaskBtn = document.getElementById("endTaskBtn");
        const randomPanel = document.getElementById("randomPanel");
        const randomLeftList = document.getElementById("randomLeftList");
        const randomCountInput = document.getElementById("randomCountInput");
        const doRandomBtn = document.getElementById("doRandomBtn");
        const replaceByRandomBtn = document.getElementById("replaceByRandomBtn");
        const randomDrawnList = document.getElementById("randomDrawnList");
        const clearDrawnBtn = document.getElementById("clearDrawnBtn");
        const randomLeftCount = document.getElementById("randomLeftCount");
        const drawnCountSpan = document.getElementById("drawnCount");
        const noReciteList = document.getElementById("noReciteList");
        const queueList = document.getElementById("queueList");
        const recitingList = document.getElementById("recitingList");
        const doneList = document.getElementById("doneList");
        const searchNoRecite = document.getElementById("searchNoRecite");
        const searchQueue = document.getElementById("searchQueue");
        const searchDone = document.getElementById("searchDone");
        const totalNum = document.getElementById("totalNum");
        const noReciteNum = document.getElementById("noReciteNum");
        const queueNum = document.getElementById("queueNum");
        const recitingNum = document.getElementById("recitingNum");
        const doneNum = document.getElementById("doneNum");
        const noReciteCount = document.getElementById("noReciteCount");
        const queueCount = document.getElementById("queueCount");
        const recitingCount = document.getElementById("recitingCount");
        const doneCount = document.getElementById("doneCount");
        
        function sortByNum(arr){ return arr.sort((a,b)=>a.num-b.num); }
        function saveData(){ localStorage.setItem('背书系统数据',JSON.stringify(classData)); localStorage.setItem('背书记录数据',JSON.stringify(recordData)); }
        
        // ---------- 核心：手势滑动迁移（修复页面滚动问题）----------
        function attachSwipeToCard(cardElement, studentObj, fromType) {
            if (!cardElement) return;
            let touchStartX = 0, touchStartY = 0;
            let isSwiping = false;
            let isGestureTriggered = false;
            
            cardElement.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                isSwiping = true;
                isGestureTriggered = false;
            }, { passive: false });
            
            cardElement.addEventListener('touchmove', (e) => {
                if (!isSwiping) return;
                const touch = e.touches[0];
                const dx = touch.clientX - touchStartX;
                const dy = touch.clientY - touchStartY;
                
                // 检测是否为有效手势（水平或垂直移动超过阈值）
                if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
                    // 如果是明显的横向滑动或向上的滑动（排队中向上滑动），阻止页面滚动
                    const isHorizontalSwipe = Math.abs(dx) > Math.abs(dy);
                    const isUpSwipe = (dy < -15) && fromType === 'queue';
                    
                    if (isHorizontalSwipe || isUpSwipe) {
                        e.preventDefault();  // 阻止页面滚动
                        e.stopPropagation();
                    }
                }
            }, { passive: false });
            
            cardElement.addEventListener('touchend', (e) => {
                if (!isSwiping) return;
                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const deltaX = endX - touchStartX;
                const deltaY = endY - touchStartY;
                isSwiping = false;
                
                // 判断是否为有效手势（移动距离足够）
                if (Math.abs(deltaX) < 25 && Math.abs(deltaY) < 25) return;
                
                // 方向判定：水平滑动优先
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX > 35 && fromType === 'noRecite') {
                        // 向右滑动: 未背书 -> 排队中
                        e.preventDefault();
                        moveStudent(studentObj, 'noRecite', 'queue');
                    } else if (deltaX < -35 && fromType === 'queue') {
                        // 向左滑动: 排队中 -> 未背书
                        e.preventDefault();
                        moveStudent(studentObj, 'queue', 'noRecite');
                    }
                } else {
                    // 垂直滑动：向上滑动（负值）且来自排队中
                    if (deltaY < -35 && fromType === 'queue') {
                        e.preventDefault();
                        // 向上滑动: 排队中 -> 正在背书
                        moveStudent(studentObj, 'queue', 'reciting');
                    }
                }
            });
        }
        
        function moveStudent(student, from, to) {
            if (!currentClass) return;
            const classInfo = classData[currentClass];
            const fromArr = classInfo[from];
            const idx = fromArr.findIndex(s => s.num === student.num && s.name === student.name);
            if(idx === -1) return;
            const moved = fromArr.splice(idx,1)[0];
            classInfo[to].push(moved);
            if(classInfo[to] === classInfo.noRecite) classInfo[to] = sortByNum(classInfo[to]);
            if(classInfo[to] === classInfo.queue) classInfo[to] = sortByNum(classInfo[to]);
            if(classInfo[to] === classInfo.reciting) classInfo[to] = sortByNum(classInfo[to]);
            if(classInfo[to] === classInfo.done) classInfo[to] = sortByNum(classInfo[to]);
            saveData();
            renderStudentList(); updateStats(); checkReminder(); renderRandomPanel();
        }
        
        // 渲染各个列表，同时附加手势
        function renderList(container, data, type, actions, emptyClass, emptyText) {
            if (!data.length) { container.innerHTML = `<div class="${emptyClass}">${emptyText}</div>`; return; }
            container.innerHTML = '';
            data.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = type === 'reciting' ? 'now-item' : 'student-item';
                let remarkHtml = item.remark ? `<span class="student-remark">📝 ${item.remark}</span>` : '';
                div.innerHTML = `
                    <div class="student-info">
                        <div class="student-name">${escapeHtml(item.name)}</div>
                        <div class="student-num">学号：${item.num}</div>
                        ${remarkHtml}
                    </div>
                    <div class="student-actions">
                        ${actions.map(act => `<button class="${act.cls}" data-action="${act.action}" data-idx="${idx}">${act.text}</button>`).join('')}
                    </div>
                `;
                div.querySelectorAll('button').forEach(btn => btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const action = btn.dataset.action;
                    const index = parseInt(btn.dataset.idx);
                    handleButtonAction(type, action, index, data);
                }));
                container.appendChild(div);
                // 附加手势：仅对未背书(向右排队) 和 排队(向左返回未背书，向上到正在背书)
                if (type === 'noRecite') attachSwipeToCard(div, item, 'noRecite');
                if (type === 'queue') attachSwipeToCard(div, item, 'queue');
            });
        }
        
        function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        function handleButtonAction(fromType, action, filterIndex, filteredArray){
            const classInfo = classData[currentClass];
            const student = filteredArray[filterIndex];
            let realIndex = classInfo[fromType].findIndex(s => s.num === student.num && s.name === student.name);
            if(realIndex === -1) return;
            if(action === 'delete'){ if(confirm(`删除${student.name}?`)) classInfo[fromType].splice(realIndex,1); }
            else if(action === 'remark'){ let remark = prompt("备注", student.remark||""); if(remark !== null) student.remark = remark.trim() || undefined; }
            else {
                let toType = '';
                if(action === 'toNoRecite') toType = 'noRecite';
                else if(action === 'toQueue') toType = 'queue';
                else if(action === 'toReciting') toType = 'reciting';
                else if(action === 'toDone') toType = 'done';
                if(toType){
                    const [moved] = classInfo[fromType].splice(realIndex,1);
                    classInfo[toType].push(moved);
                }
            }
            if(classInfo.noRecite) classInfo.noRecite = sortByNum(classInfo.noRecite);
            if(classInfo.queue) classInfo.queue = sortByNum(classInfo.queue);
            if(classInfo.reciting) classInfo.reciting = sortByNum(classInfo.reciting);
            if(classInfo.done) classInfo.done = sortByNum(classInfo.done);
            saveData();
            renderStudentList(); updateStats(); checkReminder(); renderRandomPanel();
        }
        
        // 原有所有功能函数 (保留完整)
        function renderStudentList(){
            if(!currentClass) return;
            const c = classData[currentClass];
            c.noRecite = sortByNum(c.noRecite); c.queue = sortByNum(c.queue); c.reciting = sortByNum(c.reciting); c.done = sortByNum(c.done);
            const filter = (list,search) => list.filter(i=> i.name.toLowerCase().includes(search.toLowerCase()) || i.num.toString().includes(search));
            const noFilter = filter(c.noRecite, searchNoRecite.value);
            const queueFilter = filter(c.queue, searchQueue.value);
            const doneFilter = filter(c.done, searchDone.value);
            renderList(noReciteList, noFilter, 'noRecite', [{text:'加入排队',action:'toQueue',cls:'btn-info'},{text:'开始背书',action:'toReciting',cls:'btn-warning'},{text:'标记完成',action:'toDone',cls:'btn-success'},{text:'删除',action:'delete',cls:'btn-danger'}], 'empty-tip', '暂无未背书学生');
            renderList(queueList, queueFilter, 'queue', [{text:'回到未背书',action:'toNoRecite',cls:'btn-secondary'},{text:'开始背书',action:'toReciting',cls:'btn-warning'},{text:'标记完成',action:'toDone',cls:'btn-success'},{text:'删除',action:'delete',cls:'btn-danger'}], 'empty-tip', '暂无排队学生');
            renderList(recitingList, c.reciting, 'reciting', [{text:'回到排队',action:'toQueue',cls:'btn-info'},{text:'标记完成',action:'toDone',cls:'btn-success'},{text:'删除',action:'delete',cls:'btn-danger'},{text:'备注',action:'remark',cls:'btn-secondary'}], 'empty-tip-now', '暂无正在背书学生');
            renderList(doneList, doneFilter, 'done', [{text:'回到未背书',action:'toNoRecite',cls:'btn-secondary'},{text:'删除',action:'delete',cls:'btn-danger'}], 'empty-tip', '暂无已完成学生');
        }
        
        function updateStats(){ if(!currentClass){ totalNum.textContent='0';noReciteNum.textContent='0';queueNum.textContent='0';recitingNum.textContent='0';doneNum.textContent='0';noReciteCount.textContent='0人';queueCount.textContent='0人';recitingCount.textContent='0人';doneCount.textContent='0人'; return; } const c=classData[currentClass]; totalNum.textContent=c.noRecite.length+c.queue.length+c.reciting.length+c.done.length; noReciteNum.textContent=c.noRecite.length; queueNum.textContent=c.queue.length; recitingNum.textContent=c.reciting.length; doneNum.textContent=c.done.length; noReciteCount.textContent=c.noRecite.length+'人'; queueCount.textContent=c.queue.length+'人'; recitingCount.textContent=c.reciting.length+'人'; doneCount.textContent=c.done.length+'人'; }
        function checkReminder(){ reminderBox.innerHTML=''; if(currentClass && classData[currentClass]?.noRecite.length){ let d=document.createElement("div"); d.className="reminder"; d.textContent=`⚠️ 当前有${classData[currentClass].noRecite.length}名学生未开始背书`; reminderBox.appendChild(d); } }
        function renderRandomPanel(){ if(!currentClass) return; const noRecite = classData[currentClass]?.noRecite||[]; randomLeftCount.textContent=`(${noRecite.length}人)`; randomLeftList.innerHTML=''; noRecite.forEach((stu,idx)=>{ const already=drawnStudents.some(d=>d.num===stu.num); const div=document.createElement('div'); div.className='random-student-item'; div.innerHTML=`<span>${stu.name} (${stu.num})</span><button class="random-add-btn" data-idx="${idx}" ${already?'disabled':''}>${already?'已抽取':'➕加入抽取'}</button>`; div.querySelector('button')?.addEventListener('click',()=>{ if(!already){ drawnStudents.push({name:stu.name,num:stu.num}); renderRandomPanel(); renderDrawnList(); } }); randomLeftList.appendChild(div); }); renderDrawnList(); }
        function renderDrawnList(){ randomDrawnList.innerHTML=drawnStudents.map(s=>`<span class="random-drawn-tag">${s.name}(${s.num})</span>`).join(''); drawnCountSpan.textContent=drawnStudents.length; }
        function doRandom(){ const noRecite=classData[currentClass]?.noRecite||[]; if(!noRecite.length) return alert('未背书为空'); let count=parseInt(randomCountInput.value)||1; count=Math.min(count,noRecite.length); const shuffled=[...noRecite].sort(()=>Math.random()-0.5); const picked=shuffled.slice(0,count); picked.forEach(p=>{ drawnStudents.push({name:p.name,num:p.num}); }); renderRandomPanel(); renderDrawnList(); }
        function replaceNoReciteByDrawn(){ if(!currentClass||!drawnStudents.length) return alert('抽取名单为空'); const classInfo=classData[currentClass]; const uniqueMap=new Map(); drawnStudents.forEach(s=>{ const key=`${s.num}-${s.name}`; if(!uniqueMap.has(key)) uniqueMap.set(key,{name:s.name,num:s.num}); }); classInfo.noRecite=sortByNum(Array.from(uniqueMap.values())); if(classInfo.noRecite.length) classInfo.maxNum=Math.max(...classInfo.noRecite.map(s=>s.num)); saveData(); renderStudentList(); updateStats(); renderRandomPanel(); alert(`未背书已替换为抽取的${classInfo.noRecite.length}人`); }
        function clearDrawn(){ drawnStudents=[]; renderRandomPanel(); }
        function addStudent(){ if(!currentClass) return alert("请先选择班级"); const name=studentName.value.trim(); if(!name) return alert("姓名不能为空"); const classInfo=classData[currentClass]; const num=customNum.value.trim()?parseInt(customNum.value):(classInfo.maxNum+1); const exists=[...classInfo.noRecite,...classInfo.queue,...classInfo.reciting,...classInfo.done].some(s=>s.num===num); if(exists) return alert(`学号${num}已存在`); classInfo.noRecite.push({name,num}); classInfo.maxNum=Math.max(classInfo.maxNum,num); classInfo.noRecite=sortByNum(classInfo.noRecite); saveData(); studentName.value=""; customNum.value=""; renderStudentList(); updateStats(); checkReminder(); renderRandomPanel(); }
        function importExcel(){ if(!currentClass) return alert("请先选择班级"); const file=excelFile.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=function(e){ const data=new Uint8Array(e.target.result); const wb=XLSX.read(data,{type:'array'}); const sheet=wb.Sheets[wb.SheetNames[0]]; const json=XLSX.utils.sheet_to_json(sheet); if(!json.length) return; const classInfo=classData[currentClass]; let success=0; json.forEach(item=>{ const name=item.姓名||item.名称||item.学生姓名||''; const numRaw=item.学号||item.编号||''; if(!name.trim()) return; const studentNum=numRaw?parseInt(numRaw):(classInfo.maxNum+1+success); const exists=[...classInfo.noRecite,...classInfo.queue,...classInfo.reciting,...classInfo.done].some(s=>s.num===studentNum); if(exists) return; classInfo.noRecite.push({name:name.trim(),num:studentNum}); classInfo.maxNum=Math.max(classInfo.maxNum,studentNum); success++; }); classInfo.noRecite=sortByNum(classInfo.noRecite); saveData(); renderStudentList(); updateStats(); renderRandomPanel(); alert(`导入${success}人`); }; reader.readAsArrayBuffer(file); }
        function exportExcel(){ if(!currentClass) return; const c=classData[currentClass]; const all=[...c.noRecite.map(s=>({...s,状态:'未背书'})),...c.queue.map(s=>({...s,状态:'排队中'})),...c.reciting.map(s=>({...s,状态:'正在背书'})),...c.done.map(s=>({...s,状态:'已完成'}))].sort((a,b)=>a.num-b.num); XLSX.writeFile(XLSX.utils.book_new(XLSX.utils.json_to_sheet(all),currentClass),`${currentClass}_背书数据.xlsx`); }
        function resetClass(){ if(!currentClass||!confirm(`重置${currentClass}？所有学生将回到未背书`)) return; const c=classData[currentClass]; const all=[...c.noRecite,...c.queue,...c.reciting,...c.done]; const unique=new Map(); all.forEach(s=>unique.set(s.num,s)); c.noRecite=sortByNum(Array.from(unique.values())); c.queue=[]; c.reciting=[]; c.done=[]; c.maxNum=c.noRecite.length?Math.max(...c.noRecite.map(s=>s.num)):0; drawnStudents=[]; saveData(); renderStudentList(); updateStats(); renderRandomPanel(); }
        function endTask(){ if(!currentClass||!confirm(`结束${currentClass}任务？记录将保存`)) return; const c=classData[currentClass]; const today=new Date(); const dateStr=today.toISOString().slice(0,10); const timeStr=`${today.getHours().toString().padStart(2,'0')}:${today.getMinutes().toString().padStart(2,'0')}`; const recordId=`${currentClass}_${dateStr}_${timeStr}`; const allStudents=[...c.noRecite,...c.queue,...c.reciting,...c.done]; const recordInfo={className:currentClass,date:dateStr,time:timeStr,total:allStudents.length,done:c.done.length,unfinished:c.noRecite.length+c.queue.length+c.reciting.length,details:{noRecite:[...c.noRecite],queue:[...c.queue],reciting:[...c.reciting],done:[...c.done]},picked:drawnStudents.slice()}; if(!recordData[currentClass]) recordData[currentClass]=[]; recordData[currentClass].unshift({id:recordId,...recordInfo}); if(recordData[currentClass].length>15) recordData[currentClass]=recordData[currentClass].slice(0,15); const uniqueMap=new Map(); allStudents.forEach(s=>uniqueMap.set(s.num,s)); c.noRecite=sortByNum(Array.from(uniqueMap.values())); c.queue=[]; c.reciting=[]; c.done=[]; c.maxNum=Math.max(...c.noRecite.map(s=>s.num),0); drawnStudents=[]; saveData(); renderStudentList(); updateStats(); renderRecordTabs(); renderRandomPanel(); alert("任务已结束，记录已保存"); }
        function renderRecordTabs(){ recordTabs.innerHTML=''; if(!currentClass||!recordData[currentClass]?.length){ recordContent.innerHTML='<div class="empty-tip">暂无记录</div>'; return; } recordData[currentClass].forEach((r,i)=>{ let tab=document.createElement('div'); tab.className=`record-tab ${i===0?'active':''}`; tab.dataset.recordId=r.id; tab.textContent=r.customName||`${r.date} ${r.time}`; tab.addEventListener('click',()=>{ document.querySelectorAll('.record-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentRecordId=r.id; renderRecordContent(); }); recordTabs.appendChild(tab); }); currentRecordId=recordData[currentClass][0].id; renderRecordContent(); }
        function renderRecordContent(){ if(!currentClass||!recordData[currentClass]) return; let rec=recordData[currentClass].find(r=>r.id===currentRecordId); if(!rec) return; let html=`<div><strong>${rec.className} ${rec.date} ${rec.time}</strong> 总${rec.total} 完成${rec.done} 未完成${rec.unfinished}</div>`; if(rec.picked?.length) html+=`<div><strong>抽取名单：</strong> ${rec.picked.map(p=>`${p.name}(${p.num})`).join('、')}</div>`; html+=`<br>✅已完成：${rec.details.done.map(d=>`${d.name}(${d.num})`).join('、')}`; if(rec.details.noRecite?.length) html+=`<br>⏳未背书：${rec.details.noRecite.map(d=>`${d.name}(${d.num})`).join('、')}`; if(rec.details.queue?.length) html+=`<br>🔄排队中：${rec.details.queue.map(d=>`${d.name}(${d.num})`).join('、')}`; if(rec.details.reciting?.length) html+=`<br>📖正在背书：${rec.details.reciting.map(d=>`${d.name}(${d.num})`).join('、')}`; recordContent.innerHTML=html; }
        function clearRecords(){ if(currentClass&&confirm(`清空${currentClass}记录？`)){ delete recordData[currentClass]; saveData(); renderRecordTabs(); } }
        function generateSyncKey(){ const syncData={classData,recordData,version:'1.0'}; const key=btoa(encodeURIComponent(JSON.stringify(syncData))); navigator.clipboard.writeText(key).then(()=>alert('✅ 密钥已复制')); }
        function parseSyncKey(){ try{ const jsonStr=decodeURIComponent(atob(syncKeyInput.value.trim())); pendingSyncData=JSON.parse(jsonStr); syncPreviewInfo.innerHTML=`<strong>发现同步数据：${Object.keys(pendingSyncData.classData).length}个班级</strong><br>选择覆盖或合并`; syncConfirmArea.style.display='block'; }catch(e){ alert('密钥无效'); } }
        function applySyncData(mode){ if(!pendingSyncData) return; if(mode==='overwrite'){ classData=pendingSyncData.classData; recordData=pendingSyncData.recordData; }else{ classData={...classData,...pendingSyncData.classData}; recordData={...recordData,...pendingSyncData.recordData}; } saveData(); renderClassTabs(); checkClassExists(); renderStudentList(); updateStats(); renderRecordTabs(); renderRandomPanel(); syncInputArea.style.display='none'; syncConfirmArea.style.display='none'; pendingSyncData=null; alert('同步完成'); }
        function addClass(){ const name=prompt("新班级名称"); if(name&&!classData[name.trim()]){ classData[name.trim()]={noRecite:[],queue:[],reciting:[],done:[],maxNum:0}; currentClass=name.trim(); saveData(); renderClassTabs(); checkClassExists(); renderStudentList(); updateStats(); renderRandomPanel(); } }
        function renderClassTabs(){ while(classTabs.children.length>1) classTabs.removeChild(classTabs.children[0]); Object.keys(classData).forEach(cls=>{ const tab=document.createElement("div"); tab.className=`class-tab ${cls===currentClass?'active':''}`; tab.dataset.class=cls; tab.textContent=cls; tab.addEventListener('click',()=>{ currentClass=cls; renderClassTabs(); renderStudentList(); updateStats(); checkReminder(); renderRandomPanel(); renderRecordTabs(); }); classTabs.insertBefore(tab,addClassBtn); }); }
        function checkClassExists(){ const has=Object.keys(classData).length>0; noClassTip.style.display=has?'none':'block'; controlPanel.style.display=has?'block':'none'; statusNow.style.display=has?'block':'none'; statusSection.style.display=has?'grid':'none'; recordSection.style.display=has?'block':'none'; endTaskBtn.style.display=has?'block':'none'; randomPanel.style.display=has?'block':'none'; }
        
        function attachGlobalEvents(){
            addClassBtn.addEventListener("click",addClass);
            addStudentBtn.addEventListener("click",addStudent);
            importExcelBtn.addEventListener("click",importExcel);
            exportExcelBtn.addEventListener("click",exportExcel);
            resetBtn.addEventListener("click",resetClass);
            clearAllBtn.addEventListener("click",()=>{ if(confirm('清空所有数据？')){ classData={}; recordData={}; saveData(); currentClass=""; renderClassTabs(); checkClassExists(); renderStudentList(); updateStats(); renderRandomPanel(); renderRecordTabs(); } });
            endTaskBtn.addEventListener("click",endTask);
            clearRecordsBtn.addEventListener("click",clearRecords);
            doRandomBtn.addEventListener("click",doRandom);
            replaceByRandomBtn.addEventListener("click",replaceNoReciteByDrawn);
            clearDrawnBtn.addEventListener("click",clearDrawn);
            generateSyncKeyBtn.addEventListener("click",generateSyncKey);
            showSyncInputBtn.addEventListener("click",()=>{ syncInputArea.style.display="block"; });
            cancelSyncBtn.addEventListener("click",()=>{ syncInputArea.style.display="none"; syncConfirmArea.style.display="none"; syncKeyInput.value=""; });
            importSyncKeyBtn.addEventListener("click",parseSyncKey);
            confirmOverwriteSync.addEventListener("click",()=>applySyncData('overwrite'));
            confirmMergeSync.addEventListener("click",()=>applySyncData('merge'));
            cancelConfirmSync.addEventListener("click",()=>{ syncConfirmArea.style.display="none"; pendingSyncData=null; });
            searchNoRecite.addEventListener("input",renderStudentList);
            searchQueue.addEventListener("input",renderStudentList);
            searchDone.addEventListener("input",renderStudentList);
        }
        
        function init(){ renderClassTabs(); checkClassExists(); renderStudentList(); updateStats(); checkReminder(); renderRecordTabs(); renderRandomPanel(); attachGlobalEvents(); if(currentClass) renderRandomPanel(); }
        init();
    })();
</script>
